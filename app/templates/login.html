<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<hr>

<!-- Google Login -->
<a href="/login/google" class="btn btn-danger w-100 mb-3">
    Login with Google
</a>

<br><br>

<!-- Codeforces Login -->
<form method="post" action="/login/codeforces">
    <input name="cf_handle" placeholder="Codeforces Handle" class="form-control mb-2">
    <button class="btn btn-warning w-100">
        Login with Codeforces
    </button>
</form>

<br>

<a href="/">Back to Home</a>

</body>
</html>
