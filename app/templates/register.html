<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Register</button>
</form>

<hr>

<!-- Google Register -->
<a href="/register/google">
    <button type="button">Register with Google</button>
</a>

<br><br>

<!-- Codeforces Register -->
<form action="/register/codeforces" method="post">
    <input type="text" name="cf_handle" placeholder="Codeforces Handle" required>
    <button type="submit">Register with Codeforces</button>
</form>

<br>

<a href="/">Back to Home</a>

</body>
</html>
