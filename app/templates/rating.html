<h2>Rating Wise Problems</h2>

<form method="get" action="/rating">
    
    <label>Min Rating:</label>
    <select name="min_rating">
        {% for r in rating_options %}
            <option value="{{ r }}" {% if r == min_rating %}selected{% endif %}>
                {{ r }}
            </option>
        {% endfor %}
    </select>

    <label>Max Rating:</label>
    <select name="max_rating">
        {% for r in rating_options %}
            <option value="{{ r }}" {% if r == max_rating %}selected{% endif %}>
                {{ r }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Filter</button>
</form>

<hr>

{% if problems %}
<ul>
{% for problem in problems %}
    <li>
        <a href="https://codeforces.com/problemset/problem/{{ problem.contestId }}/{{ problem.index }}" target="_blank">
            {{ problem.name }}
        </a>
        — Rating: {{ problem.rating }}
    </li>
{% endfor %}
</ul>
{% endif %}
