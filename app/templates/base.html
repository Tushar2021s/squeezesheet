<!DOCTYPE html>
<html>
<head>
    <title>Squeeze Sheet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
        }

        .brand {
            font-weight: 600;
            font-size: 20px;
        }

        .card-custom {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .card-custom:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
        }

        .btn-primary-custom {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
        }

        .btn-primary-custom:hover {
            opacity: 0.9;
        }

        .hero {
            text-align: center;
            padding: 80px 0;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
        }

        .hero p {
            color: #94a3b8;
            font-size: 18px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg px-4 py-3">
    <div class="container-fluid d-flex justify-content-between">
        <span class="brand">⚡ SqueezeSheet</span>

        <div>
            {% if request.session.get("user") %}
                <span class="me-3">👋 {{ request.session.get("user") }}</span>
                <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="/register" class="btn btn-primary-custom btn-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
