<!DOCTYPE html>
<html>
<head>
    <title>Squeeze Sheet</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
        }

        .card {
            background-color: #1e293b;
            border: none;
            border-radius: 12px;
        }

        .btn-custom {
            background-color: #3b82f6;
            border: none;
        }

        .btn-custom:hover {
            background-color: #2563eb;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Navbar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>⚡ Squeeze Sheet</h2>

        <div>
            {% if user %}
                <span class="me-3">👋 {{ user }}</span>
                <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="/register" class="btn btn-custom btn-sm">Register</a>
            {% endif %}
        </div>
    </div>

    <!-- Message -->
    {% if message %}
        <div class="alert alert-success">
            {{ message }}
        </div>
    {% endif %}

    <!-- Problem Filter Card -->
    <div class="card p-4 shadow-lg">
        <h4 class="mb-3">Generate Practice Sheet</h4>

        <form action="/problems" method="get">
            <div class="row mb-3">
                <div class="col">
                    <label>Min Rating</label>
                    <input type="number" class="form-control" name="min_rating" value="800">
                </div>
                <div class="col">
                    <label>Max Rating</label>
                    <input type="number" class="form-control" name="max_rating" value="1500">
                </div>
            </div>

            <button type="submit" class="btn btn-custom w-100">
                🚀 Generate Problems
            </button>
        </form>
    </div>

</div>

</body>
</html>
