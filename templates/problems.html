<!DOCTYPE html>
<html>
<head>
    <title>Squeeze Sheet - Problems</title>
</head>
<body>

<h1>Squeeze Sheet - Codeforces Problems</h1>

<form method="get">

    Min Rating:
    <input type="number" name="min_rating" value="{{ min_rating }}">

    Max Rating:
    <input type="number" name="max_rating" value="{{ max_rating }}">

    Tag:
    <input type="text" name="tag" value="{{ tag }}">

    Number of Problems:
    <input type="number" name="count" value="{{ count or 10 }}">

    <button type="submit">Generate Sheet</button>

</form>

<hr>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Rating</th>
        <th>Tags</th>
        <th>Link</th>
    </tr>

    {% for problem in problems %}
    <tr>
        <td>{{ problem.name }}</td>
        <td>{{ problem.rating }}</td>
        <td>
            {% for t in problem.tags %}
                {{ t }}{% if not loop.last %}, {% endif %}
            {% endfor %}
        </td>
        <td>
            <a href="https://codeforces.com/problemset/problem/{{ problem.contestId }}/{{ problem.index }}" target="_blank">
                Open
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
